name: theloop
description: "An app for the loop to improve your skills and knowledge for your future job"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  #setup
  flutter_launcher_icons: ^0.14.4
  change_app_package_name: ^1.5.0

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  cupertino_onboarding: ^1.3.0
  go_router: ^17.3.0
  flutter_bloc: ^9.1.1

  #firebase
  firebase_core: ^4.11.0
  
  flutter_localizations:
    sdk: flutter
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  web_socket_channel: ^3.0.3
  record: ^6.2.1
  flutter_pcm_sound: ^3.3.3
  http: ^1.6.0
  flutter_native_splash: ^2.4.7


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0


#icon
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "path/to/image.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: false
  macos:
    generate: false

flutter_native_splash:
  color: "#000000"
  color_dark: "#000000"
  image: assets/icon/splash_icon.png
  image_dark: assets/icon/splash_icon.png
  fullscreen: true
  android_12:
    color: "#000000"
    color_dark: "#000000"
    image: assets/icon/splash_icon.png
    image_dark: assets/icon/splash_icon.png
    icon_background_color: "#000000"
    icon_background_color_dark: "#000000"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/icon/
    - env.json
